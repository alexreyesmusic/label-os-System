<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        background: #060709;
        color: #f5f5f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <main class="min-h-screen bg-[#060709] px-6 py-12">
      <section class="mx-auto flex min-h-[80vh] max-w-3xl flex-col justify-center">
        <p class="text-xs font-black uppercase tracking-[0.35em] text-[#B6FF1A]">Label OS</p>
        <h1 class="mt-5 text-4xl font-black tracking-tight md:text-6xl">MASTER DASHBOARD vive en la app Next.js.</h1>
        <p class="mt-5 text-lg text-zinc-400">
          La versión actual usa Supabase Auth, Postgres, Storage, Row Level Security y gráficos Recharts. Configura `.env.local`, ejecuta el schema y abre la app Next.js.
        </p>
        <div class="mt-8 rounded-xl border border-zinc-800 bg-zinc-950 p-5">
          <p class="font-bold text-[#B6FF1A]">Para verla localmente:</p>
          <pre class="mt-3 overflow-x-auto rounded-lg bg-black p-4 text-sm text-zinc-200">npm install
npm run dev</pre>
          <p class="mt-4 text-sm text-zinc-500">Luego abre http://localhost:3000</p>
        </div>
      </section>
    </main>
  </body>
</html>
